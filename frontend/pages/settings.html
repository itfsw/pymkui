<div class="space-y-6">
    <div class="bg-white/5 rounded-xl p-6 shadow-lg border border-white/10">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-white flex items-center">
                <i class="fa fa-cog mr-3 text-primary"></i>
                服务器配置
            </h2>
            <button id="refreshConfig" class="bg-gradient-primary text-white px-4 py-2 rounded-lg font-semibold hover:shadow-neon transition-all duration-300 flex items-center">
                <i class="fa fa-refresh mr-2"></i>
                刷新配置
            </button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="relative">
                <input type="text" 
                       id="searchInput" 
                       placeholder="搜索配置项..." 
                       class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 pl-12 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-primary">
                <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/60"></i>
            </div>
            <div>
                <select id="categoryFilter" 
                        class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="all">全部分类</option>
                </select>
            </div>
        </div>
        
        <div id="configContainer">
        </div>
    </div>
</div>
